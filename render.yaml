services:
  # Static Site
  type: web
  name: sistema-citas-medicas
  env: static
  buildCommand: npm run build
  staticPublishPath: ./dist
  pullRequestPreviewsEnabled: true
  previewsExpireAfter: 7d
  routes:
    - type: rewrite
      source: /*
      destination: /index.html
  envVars:
    - key: NODE_ENV
      value: production
